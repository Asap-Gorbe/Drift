<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app" data-username="{{ username }}">
    <aside class="sidebar">
        <div class="brand">Drift</div>

        <div class="sidebar__section">
            <label class="sidebar__label">Conversations</label>
            <ul id="room-list" class="room-list"></ul>
        </div>

        <div class="sidebar__section">
            <label class="sidebar__label">Switch room</label>
            <div class="field">
                <input id="roomInput" placeholder="Room name" autocomplete="off">
                <button onclick="switchRoom()">Go</button>
            </div>
        </div>

        <div class="sidebar__section">
            <label class="sidebar__label">Direct message</label>
            <div class="field">
                <input id="dmInput" placeholder="Username" autocomplete="off">
                <button onclick="startDM()">DM</button>
            </div>
        </div>

        <div class="sidebar__footer">
            <span class="user"><span class="user__dot"></span>{{ username }}</span>
            <a class="logout" href="/logout">Logout</a>
        </div>
    </aside>

    <main class="chat">
        <header class="chat__header">
            <span id="currentRoom"># general</span>
        </header>
        <ul class="messages" id="messages"></ul>
        <div class="composer">
            <input id="msg" placeholder="Type a message…" autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </main>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    const CURRENT_USER = document.querySelector(".app").dataset.username;
    let currentRoom = "general";

    // On (re)connect, join the default room and ask for our conversation list.
    socket.on("connect", () => {
        socket.emit("join");
        socket.emit("get_rooms");
    });

    // --- Conversation list (live) ---
    socket.on("room_list", function (rooms) {
        const list = document.getElementById("room-list");
        list.innerHTML = "";
        rooms.forEach(room => {
            const isDM = room.name.startsWith("dm_");
            // Prefer a server-provided display name (e.g. the other user's
            // name for DMs) if it ever sends one; fall back to the raw name.
            const label = room.display || room.name;
            const prefix = isDM ? "DM · " : (room.is_private ? "🔒 " : "# ");

            const li = document.createElement("li");
            li.className = "room-list__item" + (room.name === currentRoom ? " is-active" : "");
            li.textContent = prefix + label;
            li.onclick = () => goToRoom(room.name, prefix + label);
            list.appendChild(li);
        });
    });

    // Shared "move into a room" logic used by both the list and the input.
    function goToRoom(room, label) {
        if (!room) return;
        socket.emit("switch_room", room);
        currentRoom = room;
        setRoomLabel(label || ("# " + room));
        clearMessages();
        socket.emit("get_rooms"); // refresh sidebar (active highlight + new rooms)
    }

    function switchRoom() {
        const input = document.getElementById("roomInput");
        const room = input.value.trim();
        if (!room) return;
        goToRoom(room, "# " + room);
        input.value = "";
    }

    function startDM() {
        const input = document.getElementById("dmInput");
        const target = input.value.trim();
        if (!target) return;
        socket.emit("start_dm", target);
        setRoomLabel("DM · " + target);
        clearMessages();
        socket.emit("get_rooms");
        input.value = "";
    }

    function sendMessage() {
        const input = document.getElementById("msg");
        if (!input.value.trim()) return;
        socket.send(input.value);
        input.value = "";
    }

    function setRoomLabel(text) { document.getElementById("currentRoom").textContent = text; }
    function clearMessages() { document.getElementById("messages").innerHTML = ""; }

    socket.on("message", function (text) {
        const messages = document.getElementById("messages");
        const li = document.createElement("li");
        const match = text.match(/^\[(.+?)\]:\s([\s\S]*)$/);
        if (match) {
            const sender = match[1], content = match[2];
            li.className = "message" + (sender === CURRENT_USER ? " message--own" : "");
            const s = document.createElement("span");
            s.className = "message__sender";
            s.textContent = sender;
            const c = document.createElement("span");
            c.className = "message__text";
            c.textContent = content;
            li.appendChild(s);
            li.appendChild(c);
        } else {
            li.className = "system";
            li.textContent = text;
        }
        messages.appendChild(li);
        messages.scrollTop = messages.scrollHeight;
    });

    function onEnter(id, fn) {
        document.getElementById(id).addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); fn(); }
        });
    }
    onEnter("msg", sendMessage);
    onEnter("roomInput", switchRoom);
    onEnter("dmInput", startDM);
</script>
</body>
</html>
