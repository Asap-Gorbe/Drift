<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Drift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app" data-username="{{ username }}" data-initial-room="{{ initial_room }}">
    <aside class="sidebar">
        <div class="brand">Drift</div>

        <div class="sidebar__section">
            <label class="sidebar__label">Search</label>
            <div class="field">
                <input id="searchInput" placeholder="Find people or groups" autocomplete="off">
            </div>
            <ul id="search-results" class="room-list search-results" style="display:none;"></ul>
        </div>

        <div class="sidebar__section">
            <label class="sidebar__label">Conversations</label>
            <ul id="room-list" class="room-list"></ul>
        </div>

        <div class="sidebar__section">
            <button class="btn btn--ghost create-btn" onclick="openCreate()">+ Create group</button>
        </div>

        <div class="sidebar__footer">
            <form class="user" id="avatarForm" method="post" action="/upload_avatar" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label class="avatar-upload" title="Change profile picture">
                    {% if avatar %}
                        <img src="{{ url_for('static', filename='avatars/' + avatar) }}" class="footer-avatar" alt="me">
                    {% else %}
                        <span class="footer-avatar footer-avatar--empty">+</span>
                    {% endif %}
                    <span class="avatar-upload__badge">✎</span>
                    <meta name="csrf-token" content="{{ csrf_token() }}">
                    <input type="file" name="avatar" accept="image/*" hidden
                           onchange="document.getElementById('avatarForm').submit()">
                </label>
                <span>{{ username }}</span>
            </form>
            <a class="logout" href="/logout">Logout</a>
        </div>
    </aside>

    <main class="chat">
        <header class="chat__header">
            <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open menu">☰</button>
            <span id="currentRoom" class="chat__title" onclick="openGroupPanel()"></span>
            <button class="header-action" id="deleteChatBtn" style="display:none;" onclick="deleteCurrentDM()" title="Delete chat">🗑</button>
        </header>

        <div class="empty-state" id="emptyState">
            <img src="{{ url_for('static', filename='bloommoon.jpeg') }}" alt="" class="empty-state__img">
            <p class="empty-state__text">Please select a conversation to start drifting</p>
        </div>

        <ul class="messages" id="messages" style="display:none;"></ul>
        <div class="composer" id="composer" style="display:none;">
            <input id="msg" placeholder="Type a message…" autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </main>

    <div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>

    <div class="modal" id="createModal" style="display:none;">
        <div class="modal__card">
            <div class="modal__header">
                <span>New group</span>
                <button class="modal__close" onclick="closeCreate()" aria-label="Close">×</button>
            </div>

            <div class="modal__body" id="createForm">
                <label class="group-photo-pick" title="Add a group photo">
                    <img id="groupPhotoPreview" class="group-photo-pick__img" style="display:none;" alt="">
                    <span id="groupPhotoPlaceholder" class="group-photo-pick__placeholder">📷</span>
                    <input type="file" id="groupPhoto" accept="image/*" hidden onchange="previewGroupPhoto(this)">
                </label>

                <input id="groupName" class="modal__input" placeholder="Group name" autocomplete="off" maxlength="50">
                <textarea id="groupDesc" class="modal__input modal__textarea" placeholder="Description (optional)" rows="3"></textarea>

                <div class="seg" id="visToggle">
                    <button type="button" class="seg__btn is-active" data-private="false" onclick="setVisibility(this)">Public</button>
                    <button type="button" class="seg__btn" data-private="true" onclick="setVisibility(this)">Private</button>
                </div>

                <div class="modal__error" id="createError" style="display:none;"></div>
                <button class="btn btn--primary" id="createSubmit" onclick="submitGroup()">Create group</button>
            </div>

            <div class="modal__body" id="createDone" style="display:none;">
                <p class="modal__done-text">Group created 🎉 — share this invite link:</p>
                <div class="field">
                    <input id="inviteLink" readonly>
                    <button onclick="copyInvite()">Copy</button>
                </div>
                <button class="btn btn--primary" onclick="closeCreate()">Done</button>
            </div>
        </div>
    </div>

    <div class="modal" id="groupModal" style="display:none;">
        <div class="modal__card">
            <div class="modal__header">
                <span id="groupModalTitle">Group info</span>
                <button class="modal__close" onclick="closeGroupModal()" aria-label="Close">×</button>
            </div>
            <div class="modal__body">
                <label class="group-photo-pick" id="gPhotoPick" title="Change photo">
                    <img id="gPhotoPreview" class="group-photo-pick__img" style="display:none;" alt="">
                    <span id="gPhotoPlaceholder" class="group-photo-pick__placeholder">📷</span>
                    <input type="file" id="gPhoto" accept="image/*" hidden onchange="previewGroupEditPhoto(this)">
                </label>

                <input id="gName" class="modal__input" placeholder="Group name" autocomplete="off" maxlength="50">
                <textarea id="gDesc" class="modal__input modal__textarea" placeholder="Description" rows="3"></textarea>

                <div class="seg" id="gVisToggle">
                    <button type="button" class="seg__btn" data-private="false" onclick="setGroupVisibility(this)">Public</button>
                    <button type="button" class="seg__btn" data-private="true" onclick="setGroupVisibility(this)">Private</button>
                </div>

                <div class="field" id="gLinkWrap" style="display:none;">
                    <input id="gLink" readonly>
                    <button onclick="copyGroupLink()">Copy</button>
                </div>
                <button class="btn btn--ghost" id="gRegenerate" style="display:none;" onclick="regenerateLink()">Regenerate link</button>

                <div class="modal__error" id="gError" style="display:none;"></div>
                <div class="group-members" id="gMembers" style="display:none;"></div>
                <button class="btn btn--primary" id="gSave" onclick="saveGroup()">Save changes</button>
                <button class="btn btn--danger" id="gDelete" style="display:none;" onclick="deleteCurrentGroup()">Delete group</button>
                <button class="btn btn--danger" id="gLeave" style="display:none;" onclick="leaveCurrentGroup()">Leave group</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    const APP = document.querySelector(".app");
    const CURRENT_USER = APP.dataset.username;
    const INITIAL_ROOM = APP.dataset.initialRoom;
    const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    let currentRoom = null;
    let avatars = {};   // username -> stored filename
    let unread = {};    // room name -> unread count
    let groupModalName = null;
    let groupEditPrivate = false;
    let groupIsOwner = false;

    socket.on("connect", () => {
        socket.emit("join");
        socket.emit("get_rooms");
        socket.emit("get_avatars");
        if (INITIAL_ROOM) {
            socket.emit("switch_room", INITIAL_ROOM);
            currentRoom = INITIAL_ROOM;
            setRoomLabel(INITIAL_ROOM);
            showChat();
        }
    });

    socket.on("avatars", function (map) {
        avatars = map || {};
        socket.emit("get_rooms");   // refresh sidebar so DM photos appear
    });

    // --- Conversation list (live) ---
    socket.on("room_list", function (rooms) {
        const list = document.getElementById("room-list");
        list.innerHTML = "";
        rooms.forEach(room => {
            const isDM = room.name.startsWith("dm_");
            const label = room.display || room.name;   // DM -> the other user's name
            const display = (!isDM && room.is_private ? "🔒 " : "") + label;

            const li = document.createElement("li");
            li.className = "room-list__item" + (room.name === currentRoom ? " is-active" : "");
            li.dataset.room = room.name;

            // DM -> other user's avatar; group -> initial circle from its name.
            const avatar = roomAvatarEl(room, label);
            avatar.classList.add("room-list__avatar");
            li.appendChild(avatar);

            const name = document.createElement("span");
            name.className = "room-list__name";
            name.textContent = display;
            li.appendChild(name);

            const count = unread[room.name] || 0;
            if (count > 0) {
                const badge = document.createElement("span");
                badge.className = "room-badge";
                badge.textContent = count;
                li.appendChild(badge);
            }

            li.onclick = () => goToRoom(room.name, display);
            list.appendChild(li);
        });
    });

    socket.on("active_room", function (room) {
        currentRoom = room;
        unread[room] = 0;     // opening a room clears its unread count
        renderUnread();
        updateHeaderActions();
    });

    socket.on("group_updated", function (data) {
        if (currentRoom === data.old_name && data.old_name !== data.new_name) {
            currentRoom = data.new_name;
            setRoomLabel(data.new_name);   // sidebar refresh fixes the lock prefix
            clearMessages();
            socket.emit("switch_room", data.new_name);
        }
        socket.emit("get_rooms");
    });

    function goToRoom(room, label) {
        if (!room) return;
        socket.emit("switch_room", room);
        currentRoom = room;
        unread[room] = 0;
        setRoomLabel(label || ("# " + room));
        clearMessages();
        showChat();
        socket.emit("get_rooms");
        closeSidebar();
    }

    function startDM(target) {
        if (!target) return;
        socket.emit("start_dm", target);
        setRoomLabel("DM · " + target);
        clearMessages();
        showChat();
        socket.emit("get_rooms");
        closeSidebar();
    }

    function renderUnread() {
        document.querySelectorAll("#room-list .room-list__item").forEach(li => {
            const room = li.dataset.room;
            let badge = li.querySelector(".room-badge");
            const count = unread[room] || 0;
            if (count > 0) {
                if (!badge) {
                    badge = document.createElement("span");
                    badge.className = "room-badge";
                    li.appendChild(badge);
                }
                badge.textContent = count;
            } else if (badge) {
                badge.remove();
            }
        });
    }
function updateHeaderActions() {
        // The header trash only applies to DMs (groups delete from their panel).
        const btn = document.getElementById("deleteChatBtn");
        btn.style.display = (currentRoom && currentRoom.startsWith("dm_")) ? "inline-flex" : "none";
    }

    function showEmptyState() {
        APP.classList.remove("chat-active");
        document.getElementById("messages").style.display = "none";
        document.getElementById("composer").style.display = "none";
        document.getElementById("emptyState").style.display = "flex";
        currentRoom = null;
        setRoomLabel("");
        updateHeaderActions();
    }
    async function deleteRoom(name) {
        try {
            const res = await fetch("/room/" + encodeURIComponent(name) + "/delete", { method: "POST", headers: { "X-CSRFToken": csrfToken } });
            const data = await res.json();
            if (!res.ok) { alert(data.error || "Could not delete."); return; }
            // The room_deleted event cleans up everyone's UI, including ours.
        } catch (e) {
            alert("Network error — please try again.");
        }
    }

    async function deleteCurrentGroup() {
        if (!confirm("Delete this group for everyone? This can't be undone.")) return;
        await deleteRoom(groupModalName);
        closeGroupModal();
    }

    function leaveCurrentGroup() {
        if (!groupModalName) return;
        if (!confirm("Leave this group? If it's private you'll need a new invite to rejoin.")) return;
        socket.emit("leave_group", {room: groupModalName});
        closeGroupModal();
    }

    async function deleteCurrentDM() {
        if (!currentRoom) return;
        if (!confirm("Delete this conversation? This removes it for both of you.")) return;
        await deleteRoom(currentRoom);
    }

    socket.on("room_deleted", function (data) {
        delete unread[data.name];
        if (currentRoom === data.name) showEmptyState();
        socket.emit("get_rooms");   // drop it from the sidebar
    });
    socket.on("left_group", function (data) {
        delete unread[data.name];
        if (currentRoom === data.name) showEmptyState();
        socket.emit("get_rooms");   // drop it from the sidebar
    });
    // --- Search ---
    const searchInput = document.getElementById("searchInput");
    let searchTimer = null;
    searchInput.addEventListener("input", () => {
        const q = searchInput.value.trim();
        clearTimeout(searchTimer);
        if (!q) { hideSearch(); return; }
        searchTimer = setTimeout(() => socket.emit("search", q), 150);
    });

    socket.on("search_results", function (data) {
        const box = document.getElementById("search-results");
        box.innerHTML = "";
        const found = [];
        (data.users || []).forEach(u => found.push({ label: "DM · " + u, go: () => startDM(u) }));
        (data.groups || []).forEach(g => found.push({ label: "# " + g, go: () => goToRoom(g, "# " + g) }));

        if (found.length === 0) {
            const li = document.createElement("li");
            li.className = "room-list__item";
            li.style.cursor = "default";
            li.textContent = "No matches";
            box.appendChild(li);
        } else {
            found.forEach(item => {
                const li = document.createElement("li");
                li.className = "room-list__item";
                li.textContent = item.label;
                li.onclick = () => { item.go(); clearSearch(); };
                box.appendChild(li);
            });
        }
        box.style.display = "block";
    });

    function hideSearch() {
        const box = document.getElementById("search-results");
        box.innerHTML = "";
        box.style.display = "none";
    }
    function clearSearch() {
        searchInput.value = "";
        hideSearch();
    }

    // --- Create group (modal) ---
    let groupIsPrivate = false;

    function openCreate() { resetCreate(); document.getElementById("createModal").style.display = "flex"; }
    function closeCreate() { document.getElementById("createModal").style.display = "none"; }

    function resetCreate() {
        document.getElementById("createForm").style.display = "flex";
        document.getElementById("createDone").style.display = "none";
        document.getElementById("groupName").value = "";
        document.getElementById("groupDesc").value = "";
        document.getElementById("groupPhoto").value = "";
        document.getElementById("groupPhotoPreview").style.display = "none";
        document.getElementById("groupPhotoPlaceholder").style.display = "block";
        document.getElementById("createError").style.display = "none";
        document.querySelectorAll("#visToggle .seg__btn").forEach(b => b.classList.remove("is-active"));
        document.querySelector('#visToggle .seg__btn[data-private="false"]').classList.add("is-active");
        groupIsPrivate = false;
    }

    function setVisibility(btn) {
        document.querySelectorAll("#visToggle .seg__btn").forEach(b => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        groupIsPrivate = btn.dataset.private === "true";
    }

    function previewGroupPhoto(input) {
        const file = input.files[0];
        if (!file) return;
        const img = document.getElementById("groupPhotoPreview");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
        document.getElementById("groupPhotoPlaceholder").style.display = "none";
    }

    function showCreateError(msg) {
        const e = document.getElementById("createError");
        e.textContent = msg;
        e.style.display = "block";
    }

    async function submitGroup() {
        const name = document.getElementById("groupName").value.trim();
        document.getElementById("createError").style.display = "none";
        if (!name) { showCreateError("Group name is required."); return; }

        const fd = new FormData();
        fd.append("name", name);
        fd.append("description", document.getElementById("groupDesc").value.trim());
        fd.append("is_private", groupIsPrivate ? "true" : "false");
        const photo = document.getElementById("groupPhoto").files[0];
        if (photo) fd.append("photo", photo);

        const btn = document.getElementById("createSubmit");
        btn.disabled = true;
        try {
            const res = await fetch("/create_group", { method: "POST", headers: { "X-CSRFToken": csrfToken }, body: fd });
            const data = await res.json();
            if (!res.ok) { showCreateError(data.error || "Could not create group."); return; }

            // Enter the new room: socket subscribes, replays history, sets it active.
            goToRoom(data.name, (data.is_private ? "🔒 " : "") + data.name);

            if (data.is_private && data.token) {
                document.getElementById("createForm").style.display = "none";
                document.getElementById("inviteLink").value = window.location.origin + "/join/" + data.token;
                document.getElementById("createDone").style.display = "flex";
            } else {
                closeCreate();
            }
        } catch (e) {
            showCreateError("Network error — please try again.");
        } finally {
            btn.disabled = false;
        }
    }


    function copyInvite() {
        const field = document.getElementById("inviteLink");
        field.select();
        if (navigator.clipboard) navigator.clipboard.writeText(field.value);
    }

    // --- Group details / edit panel ---
    async function openGroupPanel() {
        if (!currentRoom || currentRoom.startsWith("dm_")) return;   // groups only
        try {
            const res = await fetch("/group/" + encodeURIComponent(currentRoom));
            const g = await res.json();
            if (!res.ok) return;

            groupModalName = currentRoom;
            groupIsOwner = g.is_owner;
            groupEditPrivate = g.is_private;

            document.getElementById("gName").value = g.name;
            document.getElementById("gDesc").value = g.description || "";

            const img = document.getElementById("gPhotoPreview");
            const ph = document.getElementById("gPhotoPlaceholder");
            if (g.photo) {
                img.src = "/static/groups/" + g.photo;
                img.style.display = "block"; ph.style.display = "none";
            } else {
                img.style.display = "none"; ph.style.display = "block";
            }
            document.getElementById("gPhoto").value = "";

            document.querySelectorAll("#gVisToggle .seg__btn").forEach(b => {
                b.classList.toggle("is-active", (b.dataset.private === "true") === g.is_private);
            });

            const linkWrap = document.getElementById("gLinkWrap");
            if (g.is_private && g.invite_token) {
                document.getElementById("gLink").value = window.location.origin + "/join/" + g.invite_token;
                linkWrap.style.display = "flex";
            } else {
                linkWrap.style.display = "none";
            }

            applyOwnerMode(g.is_owner);
            renderMembers(g.members, g.owner_id);
            document.getElementById("gError").style.display = "none";
            document.getElementById("groupModal").style.display = "flex";
        } catch (e) { /* ignore */ }
    }

    function applyOwnerMode(isOwner) {
        document.getElementById("gName").readOnly = !isOwner;
        document.getElementById("gDesc").readOnly = !isOwner;
        document.querySelectorAll("#gVisToggle .seg__btn").forEach(b => b.disabled = !isOwner);
        document.getElementById("gPhotoPick").style.pointerEvents = isOwner ? "auto" : "none";
        document.getElementById("gSave").style.display = isOwner ? "block" : "none";
        document.getElementById("gRegenerate").style.display = (isOwner && groupEditPrivate) ? "block" : "none";
        document.getElementById("groupModalTitle").textContent = isOwner ? "Edit group" : "Group info";
        document.getElementById("gDelete").style.display = isOwner ? "block" : "none";
        document.getElementById("gLeave").style.display = isOwner ? "none" : "block";
    }

    function renderMembers(members, ownerId) {
        const box = document.getElementById("gMembers");
        box.innerHTML = "";
        if (!members || !members.length) { box.style.display = "none"; return; }

        const title = document.createElement("div");
        title.className = "group-members__title";
        title.textContent = "Members (" + members.length + ")";
        box.appendChild(title);

        members.forEach(m => {
            const row = document.createElement("div");
            row.className = "group-members__row";

            const avatar = avatarEl(m.username);
            avatar.classList.add("group-members__avatar");
            row.appendChild(avatar);

            const text = document.createElement("div");
            text.className = "group-members__text";

            const name = document.createElement("span");
            name.className = "group-members__name";
            name.textContent = m.username;
            text.appendChild(name);

            if (m.id === ownerId) {
                const sub = document.createElement("span");
                sub.className = "group-members__sub";
                sub.textContent = "owner";
                text.appendChild(sub);
            }

            row.appendChild(text);
            box.appendChild(row);
        });

        box.style.display = "block";
    }
    function setGroupVisibility(btn) {
        if (btn.disabled) return;
        document.querySelectorAll("#gVisToggle .seg__btn").forEach(b => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        groupEditPrivate = btn.dataset.private === "true";
        document.getElementById("gRegenerate").style.display = (groupIsOwner && groupEditPrivate) ? "block" : "none";
    }

    function previewGroupEditPhoto(input) {
        const file = input.files[0];
        if (!file) return;
        const img = document.getElementById("gPhotoPreview");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
        document.getElementById("gPhotoPlaceholder").style.display = "none";
    }

    function showGroupError(msg) {
        const e = document.getElementById("gError");
        e.textContent = msg;
        e.style.display = "block";
    }

    async function saveGroup() {
        const name = document.getElementById("gName").value.trim();
        document.getElementById("gError").style.display = "none";
        if (!name) { showGroupError("Group name is required."); return; }

        const fd = new FormData();
        fd.append("name", name);
        fd.append("description", document.getElementById("gDesc").value.trim());
        fd.append("is_private", groupEditPrivate ? "true" : "false");
        const photo = document.getElementById("gPhoto").files[0];
        if (photo) fd.append("photo", photo);

        const res = await fetch("/group/" + encodeURIComponent(groupModalName) + "/edit", { method: "POST", headers: { "X-CSRFToken": csrfToken }, body: fd });        btn.disabled = true;
        try {
            const res = await fetch("/group/" + encodeURIComponent(groupModalName) + "/edit",
                                    { method: "POST", body: fd });
            const data = await res.json();
            if (!res.ok) { showGroupError(data.error || "Could not save."); return; }

            // If renamed, follow our own view to the new name (clear first to avoid
            // history replaying on top of the old messages).
            if (data.name !== groupModalName) {
                currentRoom = data.name;
                setRoomLabel((data.is_private ? "🔒 " : "") + data.name);
                clearMessages();
                socket.emit("switch_room", data.name);
            }
            socket.emit("get_rooms");
            closeGroupModal();
        } catch (e) {
            showGroupError("Network error — please try again.");
        } finally {
            btn.disabled = false;
        }
    }

    async function regenerateLink() {
        try {
            const res = await fetch("/group/" + encodeURIComponent(groupModalName) + "/regenerate_link", { method: "POST", headers: { "X-CSRFToken": csrfToken } });
            const data = await res.json();
            if (!res.ok) { showGroupError(data.error || "Could not regenerate link."); return; }
            document.getElementById("gLink").value = window.location.origin + "/join/" + data.invite_token;
            document.getElementById("gLinkWrap").style.display = "flex";
        } catch (e) {
            showGroupError("Network error — please try again.");
        }
    }

    function copyGroupLink() {
        const field = document.getElementById("gLink");
        field.select();
        if (navigator.clipboard) navigator.clipboard.writeText(field.value);
    }

    function closeGroupModal() { document.getElementById("groupModal").style.display = "none"; }

    // --- Avatars ---
    function colorFor(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
        return "hsl(" + (Math.abs(h) % 360) + " 55% 50%)";
    }

    function avatarEl(name) {
        const file = avatars[name];
        if (file) {
            const img = document.createElement("img");
            img.className = "msg-avatar";
            img.src = "/static/avatars/" + file;
            img.alt = name;
            return img;
        }
        const div = document.createElement("div");
        div.className = "msg-avatar msg-avatar--initial";
        div.textContent = (name[0] || "?").toUpperCase();
        div.style.background = colorFor(name);
        return div;
    }
    function roomAvatarEl(room, label) {
        // A group with an uploaded photo shows that photo.
        if (!room.name.startsWith("dm_") && room.photo) {
            const img = document.createElement("img");
            img.className = "msg-avatar";
            img.src = "/static/groups/" + room.photo;
            img.alt = label;
            return img;
        }
        // DM -> other user's avatar; group without a photo -> initial circle.
        return avatarEl(label);
    }
    // --- Messaging ---
    function sendMessage() {
        const input = document.getElementById("msg");
        if (!input.value.trim()) return;
        socket.send(input.value);
        input.value = "";
    }

    function setRoomLabel(text) { document.getElementById("currentRoom").textContent = text; }
    function clearMessages() { document.getElementById("messages").innerHTML = ""; }
    function toggleSidebar() { document.querySelector(".app").classList.toggle("sidebar-open"); }
    function closeSidebar() { document.querySelector(".app").classList.remove("sidebar-open"); }

    // Swap the empty state out for the live chat the first time a room is opened.
    function showChat() {
        APP.classList.add("chat-active");
        document.getElementById("emptyState").style.display = "none";
        document.getElementById("messages").style.display = "flex";
        document.getElementById("composer").style.display = "flex";
    }

    socket.on("message", function (data) {
        const messages = document.getElementById("messages");

        // System notices (joined) still arrive as plain strings.
        if (typeof data === "string") {
            const li = document.createElement("li");
            li.className = "system";
            li.textContent = data;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            return;
        }

        // Message for a room you're NOT viewing: don't render, just count it.
        if (data.room && data.room !== currentRoom) {
            unread[data.room] = (unread[data.room] || 0) + 1;
            renderUnread();
            return;
        }

        // Otherwise it's the open room — render the bubble.
        const own = data.sender === CURRENT_USER;

        const row = document.createElement("li");
        row.className = "message-row" + (own ? " message-row--own" : "");
        if (data.id != null) row.dataset.messageId = data.id;

        const bubble = document.createElement("div");
        bubble.className = "message" + (own ? " message--own" : "");

        const s = document.createElement("span");
        s.className = "message__sender";
        s.textContent = data.sender;

        const c = document.createElement("span");
        c.className = "message__text";
        c.textContent = data.text;

        const t = document.createElement("span");
        t.className = "message__time";
        t.textContent = data.time;

        bubble.appendChild(s);
        bubble.appendChild(c);
        bubble.appendChild(t);
        bubble.appendChild(s);
        bubble.appendChild(c);
        bubble.appendChild(t);

        if (own && data.id != null) {
            const actions = document.createElement("div");
            actions.className = "message__actions";

            const editBtn = document.createElement("button");
            editBtn.type = "button";
            editBtn.className = "message__action";
            editBtn.textContent = "✎";
            editBtn.title = "Edit message";
            editBtn.onclick = function () { startEdit(bubble, c, data.id); };

            const delBtn = document.createElement("button");
            delBtn.type = "button";
            delBtn.className = "message__action message__action--danger";
            delBtn.textContent = "×";
            delBtn.title = "Delete message";
            delBtn.onclick = function () {
                if (confirm("Delete this message?")) {
                    socket.emit("delete_message", {id: data.id});
                }
            };

            actions.appendChild(editBtn);
            actions.appendChild(delBtn);
            bubble.appendChild(actions);
        }
        row.appendChild(avatarEl(data.sender));
        row.appendChild(bubble);
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
    });
    socket.on("message_deleted", function (data) {
        const row = document.querySelector(
            '.message-row[data-message-id="' + data.id + '"]'
        );
        if (row) row.remove();
    });
    socket.on("message_edited", function (data) {
        const row = document.querySelector(
            '.message-row[data-message-id="' + data.id + '"]'
        );
        if (!row) return;
        const text = row.querySelector(".message__text");
        if (text) text.textContent = data.text;
    });
    function startEdit(bubble, textSpan, id) {
        if (bubble.querySelector(".message__edit")) return;  // already editing

        const original = textSpan.textContent;

        const box = document.createElement("div");
        box.className = "message__edit";

        const input = document.createElement("textarea");
        input.className = "message__edit-input";
        input.value = original;

        const save = document.createElement("button");
        save.type = "button";
        save.className = "message__action";
        save.textContent = "Save";

        const cancel = document.createElement("button");
        cancel.type = "button";
        cancel.className = "message__action";
        cancel.textContent = "Cancel";

        function close() {
            box.remove();
            textSpan.style.display = "";
        }

        save.onclick = function () {
            const text = input.value.trim();
            if (text && text !== original) {
                socket.emit("edit_message", {id: id, text: text});
            }
            close();  // the message_edited broadcast rewrites the span text
        };
        cancel.onclick = close;

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); save.onclick(); }
            if (e.key === "Escape") { e.preventDefault(); close(); }
        });

        const btnRow = document.createElement("div");
        btnRow.className = "message__edit-buttons";
        btnRow.appendChild(save);
        btnRow.appendChild(cancel);

        box.appendChild(input);
        box.appendChild(btnRow);

        textSpan.style.display = "none";
        textSpan.parentNode.insertBefore(box, textSpan.nextSibling);
        input.focus();
    }
    function onEnter(id, fn) {
        document.getElementById(id).addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); fn(); }
        });
    }
    onEnter("msg", sendMessage);
    onEnter("groupName", submitGroup);
</script>
</body>
</html>
