<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift · Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth">
    <div class="auth__card">
        <div class="auth__brand">Drift</div>
        <p class="auth__tagline">sign in to start drifting</p>

        <form class="auth__form" action="/login" method="POST">
            <label class="auth__label">Log in</label>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn--primary">Log in</button>
        </form>

        <div class="auth__divider"><span>or</span></div>

        <form class="auth__form" action="/register" method="POST">
            <label class="auth__label">Create account</label>
            <input type="text" name="username" placeholder="Username" minlength="3" maxlength="30" required>
            <input type="password" name="password" placeholder="Password" minlength="6" maxlength="72" required>
            <button type="submit" class="btn btn--ghost">Register</button>
        </form>
    </div>
</div>
</body>
</html>
