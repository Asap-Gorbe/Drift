<!DOCTYPE html>
<html lang="en">
{% set mode = mode|default('login') %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift · Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth">
    <div class="auth__card">
        <div class="auth__brand">Drift</div>
        <div class="auth__tagline" id="authTagline">
            {{ 'Create your account' if mode == 'register' else 'Sign in to keep drifting' }}
        </div>

        {% if error %}
            <div class="auth__alert auth__alert--error">{{ error }}</div>
        {% elif notice %}
            <div class="auth__alert auth__alert--ok">{{ notice }}</div>
        {% endif %}

        <form class="auth__form" id="authForm" method="post"
              action="{{ '/register' if mode == 'register' else '/login' }}">
            <label class="auth__label" for="username">Username</label>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input id="username" name="username" value="{{ username|default('') }}"
                   placeholder="yourname" autocomplete="username" required>

            <label class="auth__label" for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="••••••••"
                   autocomplete="{{ 'new-password' if mode == 'register' else 'current-password' }}" required>

            <div id="securityFields" style="{{ 'display:none;' if mode != 'register' else '' }}">
                <label class="auth__label" for="securityQuestion">Security question</label>
                <select id="securityQuestion" name="security_question">
                    <option value="What was your first pet's name?">What was your first pet's name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What was the name of your first school?">What was the name of your first school?</option>
                    <option value="What is your favorite movie?">What is your favorite movie?</option>
                </select>

                <label class="auth__label" for="securityAnswer">Answer</label>
                <input id="securityAnswer" name="security_answer" placeholder="Your answer"
                       autocomplete="off">
            </div>

            <button class="btn btn--primary" type="submit" id="submitBtn">
                {{ 'Create account' if mode == 'register' else 'Sign in' }}
            </button>
        </form>

        <div class="auth__divider"><span>or</span></div>

        <button class="auth__toggle" type="button" id="toggleBtn" onclick="toggleMode()">
            {{ 'I already have an account' if mode == 'register' else 'Create an account' }}
        </button>
    </div>
</div>

<script>
    let mode = "{{ mode }}";

    function toggleMode() {
        const form = document.getElementById("authForm");
        const pw = document.getElementById("password");
        if (mode === "login") {
            mode = "register";
            form.action = "/register";
            document.getElementById("authTagline").textContent = "Create your account";
            document.getElementById("submitBtn").textContent = "Create account";
            document.getElementById("toggleBtn").textContent = "I already have an account";
            pw.setAttribute("autocomplete", "new-password");
            document.getElementById("securityFields").style.display = "";
            document.getElementById("securityAnswer").required = true;
        } else {
            mode = "login";
            form.action = "/login";
            document.getElementById("authTagline").textContent = "Sign in to keep drifting";
            document.getElementById("submitBtn").textContent = "Sign in";
            document.getElementById("toggleBtn").textContent = "Create an account";
            document.getElementById("securityFields").style.display = "none";
            document.getElementById("securityAnswer").required = false;
            pw.setAttribute("autocomplete", "current-password");
        }
    }

    // Match the answer field's required state to the current mode on load.
    document.getElementById("securityAnswer").required = (mode === "register");
</script>
</body>
</html>
